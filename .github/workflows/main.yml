name: macOS-Libre-Docker
on: workflow_dispatch # Para darle al botón "Run"

jobs:
  run-macos:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar KVM (Aceleración)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          sudo adduser $USER kvm
          sudo adduser $USER libvirt

      - name: Conectar Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Arrancar macOS (Big Sur)
        run: |
          # Lanzamos Docker-OSX en segundo plano
          # El puerto 5900 es el VNC
          docker run -d \
            --device /dev/kvm \
            -p 50922:10022 \
            -p 5900:5900 \
            -e "GUEST_VNC_PORT=5900" \
            -e "CAPS_LOCK=off" \
            -e SHORTNAME=big-sur \
            --name macos \
            sickcodes/docker-osx:latest

          echo "Esperando a que el sistema arranque..."
          sleep 30
          
      - name: Mantener vivo (6 horas)
        run: |
          echo "¡Listo! Conéctate por VNC a la IP de Tailscale de esta máquina."
          sleep 21600
