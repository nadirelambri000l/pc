name: MacVNC-Reforzado-Tiger

on: 
  workflow_dispatch:

jobs:
  build:
    name: MacVNC-No-MDM
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
    - name: Pre-configurar Sistema
      run: |
        # Desactivar el protector de pantalla y ahorro de energía para evitar desconexiones
        sudo -u runner defaults write com.apple.screensaver idleTime 0
        sudo pmset -a sleep 0 displaysleep 0 disksleep 0
        
        # Intentar dar permisos de accesibilidad al runner por si acaso
        sudo /usr/bin/sqlite3 /Library/Application\ Support/com.apple.TCC/TCC.db "INSERT OR REPLACE INTO access VALUES('kTCCServiceAccessibility','com.apple.Terminal',0,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,1677561330);" || true

    - name: Instalar Servidor VNC Alternativo (TigerVNC)
      run: |
        # Instalamos TigerVNC porque no depende del 'Screen Sharing' oficial de Apple
        brew install tiger-vnc ngrok
        
        # Configurar contraseña para el VNC (la contraseña será: 123456)
        mkdir -p ~/.vnc
        echo "123456" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd

    - name: Iniciar Túnel Ngrok
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        # Abrimos el túnel en el puerto 5901 (puerto por defecto de TigerVNC :1)
        ngrok tcp 5901 --log=stdout > ngrok.log &
        sleep 5
        echo "=== DIRECCIÓN DE CONEXIÓN NGROK ==="
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        echo "===================================="

    - name: Ejecutar Servidor VNC Virtual
      run: |
        # Iniciamos el servidor en el display :1
        # Usamos una resolución estándar para evitar que el proceso muera
        vncserver :1 -geometry 1280x720 -depth 24 -localhost no
        
        echo "Servidor VNC iniciado en el puerto 5901."
        echo "Usa la IP de Ngrok arriba indicada para conectar."

    - name: Loguear Actividad y Mantener Vivo
      run: |
        echo "Si ves una pantalla negra al inicio, espera 10 segundos."
        echo "Si Ngrok no muestra la IP, revisa los logs de GitHub."
        # Mantiene el runner activo
        while true; do
          if ! pgrep -x "ngrok" > /dev/null; then
            echo "Ngrok se cerró, reiniciando..."
            ngrok tcp 5901 > /dev/null &
          fi
          sleep 60
        done

    - name: Debug con tmate (Si todo lo anterior falla)
      if: failure()
      uses: mxschmitt/action-tmate@v3
