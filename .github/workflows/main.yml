name: MacVNC-Tailscale-Final

on:
  workflow_dispatch:

jobs:
  build:
    name: MacVNC-Tailscale
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
    - name: Todo en Uno (Instalar y Configurar)
      env:
        TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      run: |
        # 1. Instalar herramientas
        brew install --cask tailscale
        brew install tiger-vnc
        
        # 2. Configurar Password de VNC usando ruta absoluta
        mkdir -p ~/.vnc
        /opt/homebrew/bin/vncpasswd -f <<EOF > ~/.vnc/passwd
        123456
        123456
        EOF
        chmod 600 ~/.vnc/passwd

        # 3. Conectar Tailscale
        sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname=gh-mac-runner --accept-routes
        
        echo "------------------------------------------"
        echo "TU IP DE TAILSCALE ES:"
        /Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4
        echo "------------------------------------------"

        # 4. Iniciar Servidor VNC en puerto 5901 (Display :1)
        # Usamos ruta absoluta para evitar el error 127
        /opt/homebrew/bin/vncserver :1 -geometry 1280x720 -depth 24 -localhost no
        
        echo "Servidor VNC corriendo en el puerto 5901."

    - name: Mantener Vivo y Mostrar Status
      run: |
        IP_TS=$(/Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4)
        echo "=========================================="
        echo "CONÉCTATE A: $IP_TS:5901"
        echo "CONTRASEÑA: 123456"
        echo "=========================================="
        
        # Bucle infinito para que no se cierre el runner
        while true; do 
          sleep 60
          # Verificar que Tailscale sigue vivo
          /Applications/Tailscale.app/Contents/MacOS/Tailscale status > /dev/null || exit 1
        done

    - name: Debug con tmate (Solo si falla algo)
      if: failure()
      uses: mxschmitt/action-tmate@v3
