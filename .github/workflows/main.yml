name: MacVNC-Tailscale-Fixed

on:
  workflow_dispatch:

jobs:
  build:
    name: MacVNC-Tailscale
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
    - name: Configurar Entorno y Privacidad
      run: |
        sudo pmset -a sleep 0 displaysleep 0 disksleep 0
        sudo -u runner defaults write com.apple.screensaver idleTime 0

    - name: Instalar Tailscale y TigerVNC
      run: |
        # Instalamos Tailscale y el servidor VNC
        brew install --cask tailscale
        brew install tiger-vnc
        
        # Añadir Homebrew al PATH explícitamente para este paso
        echo "/opt/homebrew/bin" >> $GITHUB_PATH

    - name: Configurar VNC Password
      run: |
        # Usamos la ruta completa de TigerVNC para evitar el 'command not found'
        mkdir -p ~/.vnc
        /opt/homebrew/bin/vncpasswd -f <<EOF > ~/.vnc/passwd
        123456
        123456
        EOF
        chmod 600 ~/.vnc/passwd

    - name: Conectar a Tailscale
      env:
        TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      run: |
        # Iniciar Tailscale (usando la ruta de la App instalada)
        sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname=gh-mac-runner
        
        echo "=== TU IP DE TAILSCALE ==="
        /Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4
        echo "=========================="

    - name: Iniciar Servidor VNC (TigerVNC)
      run: |
        # Iniciamos el servidor en el display :1
        # Usamos la ruta completa /opt/homebrew/bin/vncserver
        /opt/homebrew/bin/vncserver :1 -geometry 1280x720 -depth 24 -localhost no
        
        echo "Servidor VNC iniciado correctamente."

    - name: Status y Mantener Vivo
      run: |
        IP_TS=$(/Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4)
        echo "------------------------------------------"
        echo "CONÉCTATE A: $IP_TS:5901"
        echo "CONTRASEÑA: 123456"
        echo "------------------------------------------"
        
        # Bucle para que el runner no se cierre
        while true; do sleep 60; done

    - name: Debug con tmate (Si falla)
      if: failure()
      uses: mxschmitt/action-tmate@v3
